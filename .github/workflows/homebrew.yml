name: Update Homebrew Formula

on:
  release:
    types: [published]

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Get release assets
        id: assets
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

          # Download binaries and compute SHA256
          curl -sL "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tnqr-mac-arm64" -o tnqr-mac-arm64
          curl -sL "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tnqr-mac-x64" -o tnqr-mac-x64

          echo "SHA256_ARM64=$(sha256sum tnqr-mac-arm64 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "SHA256_X64=$(sha256sum tnqr-mac-x64 | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Checkout homebrew tools tap
        uses: actions/checkout@v4
        with:
          repository: steve-krisjanovs/homebrew-tools
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tools

      - name: Update formula
        run: |
          VERSION=${{ steps.assets.outputs.VERSION }}
          SHA256_ARM64=${{ steps.assets.outputs.SHA256_ARM64 }}
          SHA256_X64=${{ steps.assets.outputs.SHA256_X64 }}

          FORMULA="homebrew-tools/Formula/toneai-nux-qr.rb"

          sed -i "s/version \".*\"/version \"$VERSION\"/" "$FORMULA"
          sed -i "s/REPLACE_WITH_ARM64_SHA256/$SHA256_ARM64/" "$FORMULA"
          sed -i "s/REPLACE_WITH_X64_SHA256/$SHA256_X64/" "$FORMULA"
          # Handle subsequent releases — replace existing hashes
          sed -i "/on_arm/,/end/{s/sha256 \".*\"/sha256 \"$SHA256_ARM64\"/}" "$FORMULA"
          sed -i "/on_intel/,/end/{s/sha256 \".*\"/sha256 \"$SHA256_X64\"/}" "$FORMULA"

      - name: Commit and push
        run: |
          cd homebrew-tools
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/toneai-nux-qr.rb
          git commit -m "toneai-nux-qr ${{ steps.assets.outputs.VERSION }}"
          git push
